<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip Counter</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
html,body{
  margin:0;
  padding:0;
  background:#000;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.topbar{
  text-align:center;
  padding:2vh 0;
}

.topbar button{
  background:#222;
  color:#fff;
  border:1px solid #333;
  font-size:4.5vw;
  padding:2vw 4vw;
  margin:1vw;
}

.section{
  text-align:center;
  padding-top:3vh;
}

h2{
  font-size:8vw;
  margin-bottom:3vh;
}

.row{
  display:flex;
  justify-content:center;
  gap:4vw;
}

.box{
  width:22vw;
  height:30vh;
  border:1px solid #333;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
}

.arrow{
  font-size:10vw;
  width:100%;
  background:none;
  border:none;
  color:#ff9aa2;
}

.digit{
  font-size:15vw;
}

.footer{
  position:fixed;
  bottom:1vh;
  width:100%;
  text-align:center;
  font-size:3vw;
  color:#555;
}
</style>
</head>
<body>

<div class="topbar">
  <button onclick="saveAll()">저장</button>
  <button onclick="loadAll()">불러오기</button>
  <button onclick="resetAll()">초기화</button>
</div>

<div class="section">
  <h2>단수</h2>
  <div class="row" id="row">
    <div class="box">
      <button class="arrow" onclick="change(this,100)">▲</button>
      <div class="digit">0</div>
      <button class="arrow" onclick="change(this,-100)">▼</button>
    </div>
    <div class="box">
      <button class="arrow" onclick="change(this,10)">▲</button>
      <div class="digit">0</div>
      <button class="arrow" onclick="change(this,-10)">▼</button>
    </div>
    <div class="box">
      <button class="arrow" onclick="change(this,1)">▲</button>
      <div class="digit">0</div>
      <button class="arrow" onclick="change(this,-1)">▼</button>
    </div>
  </div>
</div>

<div class="section">
  <h2>코수</h2>
  <div class="row" id="stitch">
    <div class="box">
      <button class="arrow" onclick="change(this,100)">▲</button>
      <div class="digit">0</div>
      <button class="arrow" onclick="change(this,-100)">▼</button>
    </div>
    <div class="box">
      <button class="arrow" onclick="change(this,10)">▲</button>
      <div class="digit">0</div>
      <button class="arrow" onclick="change(this,-10)">▼</button>
    </div>
    <div class="box">
      <button class="arrow" onclick="change(this,1)">▲</button>
      <div class="digit">0</div>
      <button class="arrow" onclick="change(this,-1)">▼</button>
    </div>
  </div>
</div>

<div class="footer">
  © 2026 Studio Y.Green. All rights reserved.
</div>

<script>
function getValue(section){
  const d=document.querySelector("#"+section).querySelectorAll(".digit");
  return d[0].textContent*100 + d[1].textContent*10 + d[2].textContent*1;
}

function setValue(section,value){
  const d=document.querySelector("#"+section).querySelectorAll(".digit");
  const s=String(value).padStart(3,'0');
  d[0].textContent=s[0];
  d[1].textContent=s[1];
  d[2].textContent=s[2];
}

function change(btn,delta){
  const id=btn.closest(".row").id;
  let v=getValue(id);
  v+=delta;
  if(v<0)v=0;
  if(v>999)v=999;
  setValue(id,v);
}

function saveAll(){
  localStorage.setItem("row_saved", getValue("row"));
  localStorage.setItem("stitch_saved", getValue("stitch"));
}

function loadAll(){
  const r=parseInt(localStorage.getItem("row_saved")||0);
  const s=parseInt(localStorage.getItem("stitch_saved")||0);
  setValue("row",r);
  setValue("stitch",s);
}

function resetAll(){
  setValue("row",0);
  setValue("stitch",0);
}
</script>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
